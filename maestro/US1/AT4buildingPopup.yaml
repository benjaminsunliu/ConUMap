appId: host.exp.Exponent
---
# Requires EXPO_APP_URL to be set (e.g. in Maestro .env) before running this flow.
- openLink: ${EXPO_APP_URL}
- tapOn: "SGW"
- tapOn:
    id: "e2e-marker-FB"
- assertVisible:
    text: "FB – Faubourg Building"
- tapOn:
    point: "95%, 50%"
- assertNotVisible:
    text: "FB – Faubourg Building"
