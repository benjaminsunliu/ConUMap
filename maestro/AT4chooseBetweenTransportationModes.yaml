appId: host.exp.Exponent
---
- openLink: exp://192.168.0.110:8081
- assertVisible: "Search building"
- tapOn: "Search building"
- inputText: "Henry"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "H – Henry F. Hall Building"
- tapOn: "H – Henry F. Hall Building"
- assertVisible:
    id: "directions-action-button"
- tapOn:
    id: "directions-action-button"
- assertVisible: "Your location"
- tapOn: "Your location"
- inputText: "HA"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "HA – Hingston Hall, wing HA"
- tapOn: "HA – Hingston Hall, wing HA"

- assertVisible:
    id: "walking-selector"
- swipe:
    start: 45%, 74%
    end: 45%, 40%
- tapOn:
    id: "walking-selector"
- assertVisible:
    id: "walking-route-0"
- tapOn:
    id: "walking-route-0"
- swipe:
    start: 45%, 40%
    end: 45%, 74%

- swipe:
    start: 45%, 74%
    end: 45%, 40%
- assertVisible:
    id: "transit-selector"
- tapOn:
    id: "transit-selector"
- assertVisible:
    id: "transit-route-1"
- tapOn:
    id: "transit-route-1"
- swipe:
    start: 45%, 40%
    end: 45%, 74%
