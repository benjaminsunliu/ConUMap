appId: host.exp.Exponent
---
# Requires EXPO_APP_URL to be set (e.g. via environment or Maestro .env) to the Expo app URL.
- openLink: ${EXPO_APP_URL}
- assertVisible: "LOY"
- assertVisible: "SGW"
- assertVisible:
    id: "campus-toggle-selector"
- tapOn: "SGW"
- assertVisible:
    text: "SGW"
    enabled: true
- assertVisible:
    text: "LOY"
    selected: false
- assertVisible:
    id: "e2e-marker-FB"
- tapOn: "LOY"
- assertVisible:
    text: "LOY"
    enabled: true
- assertVisible:
    text: "SGW"
    selected: false
- assertVisible:
    id: "e2e-marker-GE"
- tapOn: "SGW"
- assertVisible:
    text: "SGW"
    enabled: true
- assertVisible:
    text: "LOY"
    selected: false
- assertVisible:
    id: "e2e-marker-FB"
