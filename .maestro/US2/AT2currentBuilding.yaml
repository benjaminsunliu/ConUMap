appId: host.exp.exponent
---
- openLink: exp://localhost:8081
- setLocation:
    latitude: 45.4957849
    longitude: -73.577225

- runFlow:
    commands:
      - tapOn: "Search building"

- tapOn:
    id: "locationButton"
- runFlow:
    when:
      visible:
        text: "While using the app"
    commands:
      - tapOn: "While using the app"
      - tapOn:
          id: "locationButton"
- tapOn: "Search building"
- inputText: "Hall"
- tapOn:
    id: "end-result-H"
- assertVisible:
    id: "building-info-popup"
- assertVisible:
    id: "directions-action-button"
- tapOn:
    id: "directions-action-button"
- assertVisible: "Current Location"
- tapOn: "Current Location"
- tapOn: "Destination"
- eraseText
- inputText: "Ev"
- tapOn:
    id: "end-result-EV"
