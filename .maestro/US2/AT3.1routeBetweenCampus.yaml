appId: host.exp.exponent
---
- runFlow:
    when:
      notVisible:
        id: "building-selection"
    file: ../openLink.yaml
- tapOn: "Search building"
- inputText: "Vanier"
- tapOn: "VL – Vanier Library Building"
- tapOn: "Directions"
- tapOn: "Your Location"
- inputText: "Hall"
- tapOn: "H – Henry F. Hall Building"
- assertVisible:
    id: "walking-selector"
- assertVisible:
    id: "transit-selector"
- assertVisible:
    id: "driving-selector"
- assertVisible:
    id: "bicycling-selector"
- assertVisible:
    id: "shuttle-selector"
- tapOn:
    id: "transit-selector"
- swipe:
    from:
      id: "routes-info-popup"
    direction: UP
- tapOn:
    id: "transit-route-0"
- assertVisible:
    id: "transit-step-0"
- swipe:
    from:
      id: "driving-selector"
    direction: DOWN
