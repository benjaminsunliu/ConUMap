appId: host.exp.Exponent
---
- runFlow:
    when:
      notVisible:
        id: "building-selection"
    file: ../openLink.yaml
- tapOn: "LOY"
- tapOn:
    id: "marker-VL"
- assertVisible:
    text: "VL – Vanier Library Building"
- tapOn:
    point: "95%, 50%"
- assertNotVisible:
    text: "VL – Vanier Library Building"
